name: Release package

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get package version
        id: package-version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Check if version exists on NPM
        id: check-version
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION="${{ steps.package-version.outputs.version }}"

          if npm view "$PACKAGE_NAME@$VERSION" version 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already exists on NPM, skipping release"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION does not exist on NPM, proceeding with release"
          fi

      - name: Determine release tag
        if: steps.check-version.outputs.exists == 'false'
        id: release-tag
        run: |
          VERSION="${{ steps.package-version.outputs.version }}"
          if [[ "$VERSION" == *"beta"* ]]; then
            echo "tag=beta" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "tag=latest" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Get Node.js version from package.json
        if: steps.check-version.outputs.exists == 'false'
        id: node-version
        run: |
          NODE_VERSION=$(node -p "require('./package.json').volta.node")
          echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
          echo "Node.js version: $NODE_VERSION"

      - name: Setup Node.js
        if: steps.check-version.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        if: steps.check-version.outputs.exists == 'false'
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install dependencies
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm install

      - name: Build
        if: steps.check-version.outputs.exists == 'false'
        run: pnpm build

      - name: Publish to NPM
        if: steps.check-version.outputs.exists == 'false'
        run: npm publish --access public --tag ${{ steps.release-tag.outputs.tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPMJS_ACCESS_TOKEN }}

      - name: Create Git tag
        if: steps.check-version.outputs.exists == 'false'
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions"
          git tag "${{ steps.package-version.outputs.version }}"
          git push origin "${{ steps.package-version.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changelog for version
        if: steps.check-version.outputs.exists == 'false'
        id: get-changelog
        uses: superfaceai/release-changelog-action@v2
        with:
          path-to-changelog: CHANGELOG.md
          version: ${{ steps.package-version.outputs.version }}
          operation: read

      - name: Create GitHub release
        if: steps.check-version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.package-version.outputs.version }}
          name: ${{ steps.package-version.outputs.version }}
          body: ${{ steps.get-changelog.outputs.changelog }}
          prerelease: ${{ steps.release-tag.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
